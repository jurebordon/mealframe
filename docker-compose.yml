services:
  db:
    image: postgres:15-alpine
    container_name: mealframe-db
    environment:
      POSTGRES_DB: mealframe
      POSTGRES_USER: mealframe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealframe"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: mealframe-api
    environment:
      DATABASE_URL: postgresql+asyncpg://mealframe:${DB_PASSWORD:-password}@db:5432/mealframe
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - captures:/data/captures

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: mealframe-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8003/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
  captures:
